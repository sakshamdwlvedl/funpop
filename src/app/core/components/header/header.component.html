<header class="header">
  <!-- ── Logo ──────────────────────────────────────────────────────────────── -->
  <a class="logo" routerLink="/dashboard">
    <span class="logo-mark" aria-hidden="true">
      <img src="assets/images/funpop-logo.png" alt="logo" />
    </span>
    <span class="logo-text">FUN<span class="logo-accent">POP</span></span>
  </a>

  <!-- ── Search bar — grows to fill center ─────────────────────────────────── -->
  <div class="search-wrap">
    <form [formGroup]="form">
      <app-input
        [form]="form"
        controlName="search"
        [config]="{
          staticPlaceholder: 'Search for',
          keywords: ['Movies', 'Series', 'Actors', 'Directors'],
          icon: 'pi pi-search',
          showCrossIcon: true,
        }"
        (onClear)="onSearchClear()"
      ></app-input>
    </form>
  </div>

  <!-- ── Desktop nav — pinned right ────────────────────────────────────────── -->
  <nav class="desktop-nav">
    <button
      *ngFor="let link of navLinks"
      class="nav-btn"
      [class.active]="currentRoute === link.route"
      [ngStyle]="{
        backgroundColor: isTabActive(link) ? link.activeBg : 'transparent',
        borderColor: isTabActive(link) ? link.activeColor : 'transparent',
        color: isTabActive(link) ? link.activeColor : 'black',
      }"
      (click)="navigateTo(link.route!)"
    >
      <i
        [class]="currentRoute === link.route ? link.activeIcon : link.icon"
      ></i>
      <span>{{ link.label }}</span>
    </button>
  </nav>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MOBILE BOTTOM TAB BAR
     Shown only on mobile via CSS. Sits fixed at bottom of viewport.
════════════════════════════════════════════════════════════════════════════ -->
<nav class="bottom-bar">
  <button
    *ngFor="let link of allNavLinks"
    class="tab-item"
    [class.active]="isTabActive(link)"
    (click)="!isTabActive(link) && onTabClick(link, true)"
  >
    <span
      class="tab-icon"
      [ngStyle]="{
        backgroundColor: isTabActive(link) ? link.activeBg : 'transparent',
        color: isTabActive(link) ? link.activeColor : 'black',
      }"
      ><i [class]="isTabActive(link) ? link.activeIcon : link.icon"></i
    ></span>
    <span class="tab-label">{{ link.label }}</span>
  </button>
</nav>
