<div class="header">
  <h1 class="heading text-nowrap mb-0">MOVIE BANK</h1>
  <form [formGroup]="form" class="header-form">
    <app-input
      [form]="form"
      controlName="search"
      [config]="{
        staticPlaceholder: 'Search for',
        keywords: ['Movies', 'Series', 'Actors', 'Directors'],
        icon: 'pi pi-search',
      }"
    ></app-input>
  </form>
</div>
