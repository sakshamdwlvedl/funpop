<div class="card">
  <div class="rank-badge" *ngIf="rank">
    {{ rank }}
  </div>
  <img
    [ngSrc]="movie.poster_path"
    [alt]="movie.title || movie.name || 'Movie Poster'"
    [width]="commonService.isMobile ? 110 : 180"
    [height]="commonService.isMobile ? 165 : 270"
  />

  <div class="title" *ngIf="!rank">
    {{ movie.title || movie.name }}
  </div>
</div>
