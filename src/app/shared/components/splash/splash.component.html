<div class="splash-screen" #splashContainer>
  <p class="bg-text">
    <span *ngFor="let letter of appNameLetters" class="letter">
      {{ letter }}
    </span>
  </p>
  <p class="app-name">#{{ COMMON.APP_NAME }}</p>

  <div class="logo-wrapper">
    <img
      src="assets/images/funpop-logo.png"
      [alt]="COMMON.APP_NAME"
      class="logo-img"
      #logoImg
    />
  </div>
</div>
