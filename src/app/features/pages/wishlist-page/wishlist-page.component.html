<div class="wishlist-container">
  <header class="page-header">
    <h1>My Wishlist</h1>
    <p>Drag and drop items to set your watching priority</p>
  </header>

  <div *ngIf="loading" class="loader-wrap">
    <div class="dots-loader"></div>
  </div>

  <div *ngIf="!loading && wishlist.length === 0" class="empty-state">
    <i class="pi pi-bookmark"></i>
    <h2>Your wishlist is empty</h2>
    <p>Add movies and shows to keep track of what you want to watch next.</p>
  </div>

  <div
    *ngIf="!loading && wishlist.length > 0"
    cdkDropList
    cdkDropListOrientation="mixed"
    class="wishlist-grid"
    (cdkDropListDropped)="drop($event)"
  >
    <div
      *ngFor="let item of wishlist"
      cdkDrag
      class="wishlist-item"
    >
      <app-movie-card
        [movie]="item"
        [isWishlist]="true"
        [type]="item.media_type"
      ></app-movie-card>
      
      <!-- Drag Handle for Mobile (optional, but good for UX) -->
      <div class="drag-handle" cdkDragHandle>
        <i class="pi pi-bars"></i>
      </div>

      <!-- Preview during drag -->
      <div *cdkDragPlaceholder class="drag-placeholder"></div>
    </div>
  </div>
</div>
