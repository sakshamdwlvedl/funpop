<div class="favourites-container">
  <header class="page-header">
    <h1>My Favourites</h1>
    <p>Your all-time best movies and shows</p>
  </header>

  <div *ngIf="loading" class="loader-wrap">
    <div class="dots-loader"></div>
  </div>

  <div *ngIf="!loading && favourites.length === 0" class="empty-state">
    <i class="pi pi-heart"></i>
    <h2>No favourites yet</h2>
    <p>Mark movies and shows with a heart to see them here.</p>
  </div>

  <div
    *ngIf="!loading && favourites.length > 0"
    class="favourites-grid"
  >
    <div
      *ngFor="let item of favourites"
      class="favourites-item"
    >
      <app-movie-card
        [movie]="item"
        [isFavorite]="true"
        [type]="item.media_type"
      ></app-movie-card>
    </div>
  </div>
</div>
