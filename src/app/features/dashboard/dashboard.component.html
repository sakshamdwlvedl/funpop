<div class="dashboard">
  <app-hero-carousel [items]="heroCarouselData"></app-hero-carousel>

  <ng-container *ngFor="let section of sections">
    <app-carousel [title]="section.label">
      <app-movie-card
        *ngFor="let movie of data[section.key]; trackBy: trackById"
        [movie]="movie"
        [type]="movie.title ? 'movie' : 'tv'"
      >
      </app-movie-card>
    </app-carousel>
  </ng-container>
</div>
